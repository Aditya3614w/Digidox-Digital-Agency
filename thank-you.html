    <style>
        :root {
            --bg: #07111f;
            --bg-soft: #0c1728;
            --panel: rgba(255, 255, 255, 0.05);
            --border: rgba(255, 255, 255, 0.1);
            --text: #f6f8ff;
            --muted: #aeb9d2;
            --primary: #80a8ff;
            --accent: #79e6d1;
            --shadow: 0 18px 50px rgba(0, 0, 0, 0.28);
            --radius: 24px;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: Inter, system-ui, sans-serif;
            color: var(--text);
            background: radial-gradient(circle at top left, rgba(128, 168, 255, 0.16), transparent 26%),
                        radial-gradient(circle at top right, rgba(121, 230, 209, 0.12), transparent 22%),
                        linear-gradient(180deg, #06101d 0%, #0a1423 100%);
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            overflow: hidden;
        }

        .container {
            max-width: 600px;
            padding: 40px;
            background: var(--panel);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            margin: 20px;
        }

        .icon {
            width: 80px;
            height: 80px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            font-size: 40px;
            color: #06101d;
        }

        h1 {
            font-size: clamp(32px, 5vw, 48px);
            margin-bottom: 20px;
            background: linear-gradient(135deg, #ffffff, #bed1ff);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }

        p {
            color: var(--muted);
            font-size: 18px;
            line-height: 1.6;
            margin-bottom: 32px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 16px 32px;
            background: linear-gradient(135deg, var(--primary), var(--accent));
            color: #06101d;
            font-weight: 700;
            border-radius: 999px;
            text-decoration: none;
            transition: all 0.3s ease;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(128, 168, 255, 0.3);
        }
    </style>
